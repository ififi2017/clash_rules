[custom]
;不要随意改变关键字，否则会导致出错
;规则基底：sublink MetaCubeX 结构
;自定义规则优先级高于 MetaCubeX 同组规则

;设置规则标志位

; ── 用户自定义规则（优先级高，列在 MetaCubeX 规则之前）─────────────
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ifigi2017/clash_rules/master/rules/Fix_Steam_CN_CDN.mrs
ruleset=🔍 谷歌服务,https://raw.githubusercontent.com/ifigi2017/clash_rules/master/rules/Fix_Google_Play.mrs
ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ifigi2017/clash_rules/master/rules/apple.list
ruleset=💬 AI 服务,https://raw.githubusercontent.com/ifigi2017/clash_rules/master/rules/OpenAI.list
ruleset=🤖 NewBing,https://raw.githubusercontent.com/ifigi2017/clash_rules/master/rules/Bing.mrs
ruleset=⚽ EA,https://raw.githubusercontent.com/ifigi2017/clash_rules/master/rules/EA.mrs
ruleset=🎮 游戏平台,https://raw.githubusercontent.com/ifigi2017/clash_rules/master/rules/Steam.mrs
ruleset=🎮 游戏平台,https://raw.githubusercontent.com/ifigi2017/clash_rules/master/rules/FUT.mrs
ruleset=🎵 TikTok,https://raw.githubusercontent.com/ifigi2017/clash_rules/master/rules/TikTok.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ifigi2017/clash_rules/master/rules/zerotier.list

; ── MetaCubeX 规则（sublink 基底）────────────────────────────────────
ruleset=💬 AI 服务,https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/category-ai-!cn.mrs
ruleset=📹 油管视频,https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/youtube.mrs
ruleset=🔍 谷歌服务,https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/google.mrs
ruleset=🔒 国内服务,https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/geolocation-cn.mrs
ruleset=🔒 国内服务,https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/cn.mrs
ruleset=🐱 Github,https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/github.mrs
ruleset=🐱 Github,https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/gitlab.mrs
ruleset=🌐 非中国,https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/geolocation-!cn.mrs
ruleset=🔍 谷歌服务,https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/google.mrs
ruleset=🏠 私有网络,https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/private.mrs
ruleset=🔒 国内服务,https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/cn.mrs
ruleset=📲 电报消息,https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/telegram.mrs
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL
;设置规则标志位

;设置分组标志位
; ── 节点选择 / 地区组 ─────────────────────────────────────────────────
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]🚀 手动切换`[]DIRECT
custom_proxy_group=🚀 手动切换`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇭🇰 香港节点`url-test`(港|HK|Hong Kong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇲 美国节点`url-test`(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)`http://www.gstatic.com/generate_204`300,,150

; ── 服务分组（sublink 基底，默认走代理）──────────────────────────────
custom_proxy_group=🔍 谷歌服务`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]🚀 手动切换`[]DIRECT
custom_proxy_group=💬 AI 服务`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]🚀 手动切换`[]DIRECT
custom_proxy_group=📹 油管视频`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]🚀 手动切换`[]DIRECT
custom_proxy_group=📲 电报消息`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]🚀 手动切换`[]DIRECT
custom_proxy_group=🐱 Github`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]🚀 手动切换`[]DIRECT
custom_proxy_group=🌐 非中国`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]🚀 手动切换`[]DIRECT
custom_proxy_group=🏠 私有网络`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🔒 国内服务`select`[]DIRECT`[]🚀 节点选择

; ── 用户自定义服务分组 ────────────────────────────────────────────────
custom_proxy_group=🤖 NewBing`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]🚀 手动切换`[]DIRECT
custom_proxy_group=🎵 TikTok`select`[]🚀 节点选择`[]♻️ 自动选择`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]🚀 手动切换`[]DIRECT
custom_proxy_group=🍎 苹果服务`select`[]DIRECT`[]🚀 节点选择`[]🇺🇲 美国节点`[]🇭🇰 香港节点`[]🚀 手动切换
custom_proxy_group=⚽ EA`select`[]DIRECT`[]🚀 节点选择`[]🇺🇲 美国节点`[]🇭🇰 香港节点`[]🚀 手动切换
custom_proxy_group=🎮 游戏平台`select`[]DIRECT`[]🚀 节点选择`[]🇺🇲 美国节点`[]🇭🇰 香港节点`[]🚀 手动切换
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]🚀 手动切换
;设置分组标志位

enable_rule_generator=true
overwrite_original_rules=true
